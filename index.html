<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="S&J Tracker">
<meta name="theme-color" content="#e94560">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%230f0f1a'/><text x='256' y='340' font-size='280' text-anchor='middle' fill='%23e94560'>S</text></svg>">
<title>Shredded & Jacked</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#f0f0f0;overflow:hidden;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top)}
:root{--bg:#0f0f1a;--card:#1a1a2e;--accent:#e94560;--accent2:#0f3460;--green:#00c853;--yellow:#ffd600;--red:#ff5252;--text:#f0f0f0;--muted:#888;--input-bg:#2a2a3e;--border:#333;--safe-bottom:env(safe-area-inset-bottom,0px)}

/* TOP BAR */
.top-bar{flex-shrink:0;background:var(--bg);border-bottom:2px solid var(--accent);padding:8px 16px}
.title{font-size:17px;font-weight:800;text-align:center;color:var(--accent);letter-spacing:0.5px}
.week-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:6px}
.week-nav button{background:var(--accent);color:#fff;border:none;border-radius:10px;width:44px;height:44px;font-size:22px;font-weight:700;cursor:pointer;-webkit-appearance:none;touch-action:manipulation}
.week-nav button:active{opacity:0.7}
.week-nav button:disabled{opacity:0.25}
.week-label{font-size:16px;font-weight:700;min-width:90px;text-align:center}

/* BOTTOM TAB BAR */
.tab-bar{flex-shrink:0;display:flex;background:var(--card);border-top:1px solid var(--border);padding:6px 4px calc(6px + var(--safe-bottom));gap:2px}
.tab-bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border-radius:10px;cursor:pointer;touch-action:manipulation;position:relative;font-size:10px;color:var(--muted);font-weight:600}
.tab-bar-item.active{color:var(--accent)}
.tab-bar-item .tab-icon{font-size:20px;line-height:1}
.tab-bar-item .tab-dot{position:absolute;top:4px;right:calc(50% - 16px);width:6px;height:6px;border-radius:50%;background:var(--green);display:none}
.tab-bar-item .tab-dot.visible{display:block}

/* SCROLLABLE CONTENT */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
.content{padding:12px 12px 24px}

/* SECTIONS & CARDS */
.section-hdr{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;padding:14px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px}
.exercise-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.ex-name{font-size:15px;font-weight:700;margin-bottom:2px}
.ex-target{font-size:12px;color:var(--muted);margin-bottom:8px}
.ex-target .prev{color:var(--accent)}
.set-hdr{display:grid;grid-template-columns:32px 1fr 1fr;gap:8px;margin-bottom:4px}
.set-hdr span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;text-align:center}
.set-row{display:grid;grid-template-columns:32px 1fr 1fr;gap:8px;margin-bottom:6px;align-items:center}
.set-label{font-size:13px;font-weight:700;color:var(--accent);text-align:center}
.set-input{background:var(--input-bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;text-align:center;padding:12px 4px;width:100%;-webkit-appearance:none;appearance:none;font-weight:500}
.set-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(233,69,96,0.25)}
.set-input.hit{border-color:var(--green);background:rgba(0,200,83,0.1)}
.set-input.miss{border-color:var(--red);background:rgba(255,82,82,0.1)}

.copy-link{font-size:11px;color:var(--accent);cursor:pointer;text-align:right;display:block;margin-top:2px;padding:6px 0;touch-action:manipulation}
.vol-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.vol-label{font-size:11px;color:var(--muted)}
.vol-val{font-size:14px;font-weight:700;color:var(--accent2)}
.vol-val.up{color:var(--green)}
.vol-val.down{color:var(--red)}
.badge{font-size:10px;padding:2px 8px;border-radius:6px;margin-left:6px;font-weight:600}
.badge.up{background:rgba(0,200,83,0.15);color:var(--green)}
.badge.down{background:rgba(255,82,82,0.15);color:var(--red)}
.set-summary{font-size:11px;color:var(--muted);margin-top:6px}
.set-summary strong{color:var(--text)}
.notes-input{width:100%;background:var(--input-bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:10px;margin-top:6px;resize:none;min-height:40px;-webkit-appearance:none;font-family:inherit}
.notes-input:focus{outline:none;border-color:var(--accent)}
.notes-toggle{font-size:11px;color:var(--muted);cursor:pointer;margin-top:4px;padding:6px 0;touch-action:manipulation}

/* SUMMARY & DASHBOARD */
.summary-card{background:linear-gradient(135deg,var(--accent2),var(--card));border-radius:14px;padding:16px;margin:12px 0;border:1px solid var(--accent2)}
.summary-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
.summary-row{display:flex;justify-content:space-between;padding:5px 0;font-size:14px}
.summary-row .label{color:var(--muted)}
.summary-row .value{font-weight:700}

.dash-section{margin-bottom:20px}
.dash-section h3{font-size:14px;color:var(--accent);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
.metric-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border)}
.metric-card .mlabel{font-size:12px;color:var(--muted);margin-bottom:6px}
.metric-card input{width:100%;background:var(--input-bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:18px;padding:10px;font-weight:700;-webkit-appearance:none}
.metric-card input:focus{outline:none;border-color:var(--accent)}
.kl-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.kl-row:last-child{border:none}
.kl-name{font-size:13px;font-weight:600}
.kl-val{font-size:15px;font-weight:700}

.data-actions{display:flex;gap:8px;padding:12px 0;flex-wrap:wrap}
.data-actions button{flex:1;min-width:90px;padding:12px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);-webkit-appearance:none;touch-action:manipulation}
.data-actions button:active{opacity:0.7}
.btn-export{background:var(--accent2);color:#fff;border-color:var(--accent2) !important}
.btn-import{background:var(--card);color:var(--text)}
.btn-clear{background:var(--card);color:var(--red);border-color:var(--red) !important}

.toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 24px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;z-index:200;pointer-events:none}
.toast.show{opacity:1}

.wo-header{font-size:13px;color:var(--muted);margin-bottom:12px;text-align:center}

/* Install banner */
.install-banner{background:var(--accent);color:#fff;padding:10px 16px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;display:none;flex-shrink:0;touch-action:manipulation}
.install-banner.show{display:block}
</style>
</head>

<script>
(function(){
"use strict";

var NUM_WEEKS=16, cW=0, cD='mon', D={};

// --- Storage ---
function load(){
  try{D=JSON.parse(localStorage.getItem('sjT4')||'{}');}catch(e){D={};}
}
function save(){
  try{localStorage.setItem('sjT4',JSON.stringify(D));}catch(e){}
  toast('Saved!');
}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1200);}
function ky(d,e,w,f){return d+'_'+e+'_w'+w+'_'+f;}
function gv(d,e,w,f){return D[ky(d,e,w,f)]||'';}
function sv(d,e,w,f,v){var k=ky(d,e,w,f);if(v===''||v===undefined||v===null)delete D[k];else D[k]=v;}

function exVol(d,eid,w,ns){
  var tot=0,any=false;
  for(var s=1;s<=ns;s++){
    var wt=parseFloat(gv(d,eid,w,'wt'+s));
    var rp=parseFloat(gv(d,eid,w,'r'+s));
    if(!isNaN(wt)&&!isNaN(rp)){tot+=wt*rp;any=true;}
  }
  return any?tot:null;
}

function hasData(d,w){
  var wo=W[d];if(!wo)return false;
  for(var i=0;i<wo.sections.length;i++){var sec=wo.sections[i];
    for(var j=0;j<sec.exercises.length;j++){var e=sec.exercises[j];
      if(gv(d,e.id,w,'wt1')||gv(d,e.id,w,'r1'))return true;
    }}
  return false;
}

// --- Program Data ---
var W={

    {id:"cable_pushdown_mon",name:"Cable Tricep Pushdown (rope)",target:"3 \u00d7 12\u201315",sets:3,rr:[12,15]}
  ]}
]},
tue:{label:"Tue",full:"TUE \u2014 Lower A: Quad + Core",icon:"\ud83e\uddb5",sections:[

    {id:"hack_squat",name:"Hack Squat / Heels-Elevated",target:"4 \u00d7 8\u201310",sets:4,rr:[8,10]},
    {id:"bulgarian_split_squat",name:"Bulgarian Split Squat (DB)",target:"3 \u00d7 10/leg",sets:3,rr:[10,10]}
  ]},
  {name:"ISOLATION",exercises:[
    {id:"leg_extension",name:"Leg Extension",target:"3 \u00d7 12\u201315",sets:3,rr:[12,15]},
    {id:"seated_leg_curl_tue",name:"Seated Leg Curl",target:"3 \u00d7 10\u201312",sets:3,rr:[10,12]},

  ]},

]},

    {id:"weighted_pullup",name:"Weighted Pull-Up / Pulldown",target:"4 \u00d7 8\u201310",sets:4,rr:[8,10]}
  ]},

  ]},

    {id:"ss_ez_curl",name:"EZ-Bar Curl",target:"3 \u00d7 10\u201312",sets:3,rr:[10,12]},

    {id:"ss_cable_pushdown_wed",name:"Cable Pushdown",target:"3 \u00d7 10\u201312",sets:3,rr:[10,12]}
  ]}
]},

  ]}
]},

  {name:"WEAK POINT ROTATION",exercises:[
    {id:"weak_primary",name:"Primary: Press / Raise / Thrust",target:"4 \u00d7 10\u201315",sets:4,rr:[10,15]},
    {id:"weak_secondary",name:"Secondary: Fly / Row / Kickback",target:"3 \u00d7 12\u201315",sets:3,rr:[12,15]}
  ]},
  {name:"DELTS",exercises:[

  ]},
  {name:"ARMS \u2014 SUPERSETS",exercises:[
    {id:"ss_cable_curl_fri",name:"Cable Curl",target:"3 \u00d7 12\u201315",sets:3,rr:[12,15]},
    {id:"ss_cable_push_fri",name:"Cable Pushdown",target:"3 \u00d7 12\u201315",sets:3,rr:[12,15]},
    {id:"ss_incline_curl_fri",name:"Incline DB Curl",target:"3 \u00d7 10\u201312",sets:3,rr:[10,12]},
    {id:"ss_oh_tri_fri",name:"OH DB Tri Extension",target:"3 \u00d7 10\u201312",sets:3,rr:[10,12]}
  ]},
  {name:"ROTATION",exercises:[
    {id:"landmine_press",name:"Landmine Rotational Press",target:"3 \u00d7 8/side",sets:3,rr:[8,8]}
  ]}
]},
eve:{label:"Eve",full:"EVE \u2014 Home Core + KB",icon:"\ud83c\udfe0",sections:[
  {name:"CORE BLOCK",exercises:[
    {id:"side_plank_abd",name:"Side Plank w/ Hip Abduction",target:"3 \u00d7 10/side",sets:3,rr:[10,10]},
    {id:"ab_wheel",name:"Ab Wheel Rollout",target:"3 \u00d7 8\u201312",sets:3,rr:[8,12]},
    {id:"hanging_knee_raise",name:"Hanging Knee Raise",target:"3 \u00d7 12\u201315",sets:3,rr:[12,15]},
    {id:"dead_bug",name:"Dead Bug",target:"2 \u00d7 10/side",sets:2,rr:[10,10]}
  ]},
  {name:"KETTLEBELL BLOCK",exercises:[
    {id:"kb_swing",name:"Kettlebell Swing",target:"4 \u00d7 12\u201315",sets:4,rr:[12,15]},
    {id:"kb_goblet_squat",name:"KB Goblet Squat (optional)",target:"2 \u00d7 15",sets:2,rr:[15,15]}
  ]}

};

// --- Week Navigation ---
function changeWeek(delta){
  cW=Math.max(0,Math.min(NUM_WEEKS-1,cW+delta));
  document.getElementById('weekLabel').textContent='Week '+(cW+1);
  document.getElementById('prevWeek').disabled=cW===0;
  document.getElementById('nextWeek').disabled=cW===NUM_WEEKS-1;
  renderTabs();render();
}

// --- Tab Bar (bottom, iOS-style) ---
function renderTabs(){
  var t=document.getElementById('tabBar');
  var h='<div class="tab-bar-item'+(cD==='dash'?' active':'')+'" data-day="dash"><span class="tab-icon">\ud83d\udcca</span>Dash</div>';
  for(var key in W){if(!W.hasOwnProperty(key))continue;
    var wo=W[key],hd=hasData(key,cW);
    h+='<div class="tab-bar-item'+(cD===key?' active':'')+'" data-day="'+key+'"><span class="tab-dot'+(hd?' visible':'')+'"></span><span class="tab-icon">'+wo.icon+'</span>'+wo.label+'</div>';
  }
  t.innerHTML=h;
}

function render(){
  if(cD==='dash')renderDash();else renderWO(cD);
  // Scroll to top on tab switch
  document.getElementById('scrollArea').scrollTop=0;
}

// --- Workout Rendering ---
function renderWO(day){
  var wo=W[day],c=document.getElementById('content');
  var h='<div class="wo-header">'+wo.full+'</div>';
  var totV=0,prevTV=0,anyData=false;

  for(var si=0;si<wo.sections.length;si++){
    var sec=wo.sections[si];
    h+='<div class="section-hdr">'+sec.name+'</div>';
    for(var ei=0;ei<sec.exercises.length;ei++){
      var ex=sec.exercises[ei];
      var vol=exVol(day,ex.id,cW,ex.sets);
      var pVol=cW>0?exVol(day,ex.id,cW-1,ex.sets):null;
      if(vol!==null){totV+=vol;anyData=true;}
      if(pVol!==null)prevTV+=pVol;

      var prevHint='';
      if(cW>0){
        var parts=[];
        for(var s=1;s<=ex.sets;s++){
          var pw=gv(day,ex.id,cW-1,'wt'+s),pr=gv(day,ex.id,cW-1,'r'+s);
          if(pw&&pr)parts.push(pw+'\u00d7'+pr);
        }
        if(parts.length)prevHint='Last wk: '+parts.join(', ');
      }

      var badge='';
      if(vol!==null&&pVol!==null&&pVol>0){
        var df=((vol-pVol)/pVol*100).toFixed(1);
        if(vol>pVol)badge='<span class="badge up">\u25b2'+df+'%</span>';
        else if(vol<pVol)badge='<span class="badge down">\u25bc'+df+'%</span>';
      }

      h+='<div class="exercise-card"><div class="ex-name">'+ex.name+'</div>';
      h+='<div class="ex-target">Target: '+ex.target+(prevHint?' &nbsp;|&nbsp; <span class="prev">'+prevHint+'</span>':'')+'</div>';
      h+='<div class="set-hdr"><span></span><span>Weight</span><span>Reps ('+ex.rr[0]+(ex.rr[1]!==ex.rr[0]?'\u2013'+ex.rr[1]:'')+')</span></div>';

      for(var s=1;s<=ex.sets;s++){
        var curWt=gv(day,ex.id,cW,'wt'+s);
        var curRp=gv(day,ex.id,cW,'r'+s);
        var prevW=cW>0?gv(day,ex.id,cW-1,'wt'+s):'';
        var prevR=cW>0?gv(day,ex.id,cW-1,'r'+s):'';
        var rc='set-input';
        if(curRp!==''){var rv=parseFloat(curRp);if(!isNaN(rv))rc+=rv>=ex.rr[0]?' hit':' miss';}

        h+='<div class="set-row">';
        h+='<div class="set-label">S'+s+'</div>';
        h+='<input class="set-input" type="number" inputmode="decimal" step="any" placeholder="'+(prevW||'lbs')+'" value="'+curWt+'" data-day="'+day+'" data-ex="'+ex.id+'" data-set="'+s+'" data-field="wt">';
        h+='<input class="'+rc+'" type="number" inputmode="numeric" placeholder="'+(prevR||'\u2014')+'" value="'+curRp+'" data-day="'+day+'" data-ex="'+ex.id+'" data-set="'+s+'" data-field="rp" data-min="'+ex.rr[0]+'">';
        h+='</div>';
      }

      h+='<div class="copy-link" data-day="'+day+'" data-ex="'+ex.id+'" data-sets="'+ex.sets+'">Copy S1 weight to all sets</div>';

      var done=0,totReps=0,allTop=true;
      for(var s2=1;s2<=ex.sets;s2++){
        var r=parseFloat(gv(day,ex.id,cW,'r'+s2));
        if(!isNaN(r)){done++;totReps+=r;if(r<ex.rr[1])allTop=false;}
      }
      if(done>0){
        var advice='';
        if(allTop&&done===ex.sets)advice='<span style="color:var(--green);font-weight:700"> \u2192 Add 5 lbs next week!</span>';
        else{
          var missed=[];
          for(var s3=1;s3<=ex.sets;s3++){var r2=parseFloat(gv(day,ex.id,cW,'r'+s3));if(!isNaN(r2)&&r2<ex.rr[0])missed.push(s3);}
          if(missed.length)advice='<span style="color:var(--red)"> \u2192 Below range on set'+(missed.length>1?'s':'')+' '+missed.join(', ')+'</span>';
        }
        h+='<div class="set-summary">'+done+'/'+ex.sets+' sets, <strong>'+totReps+' total reps</strong>'+advice+'</div>';
      }

      if(vol!==null){
        var vc=pVol!==null&&vol>pVol?' up':pVol!==null&&vol<pVol?' down':'';
        h+='<div class="vol-row"><span class="vol-label">Volume</span><span class="vol-val'+vc+'">'+vol.toLocaleString()+' lbs</span>'+badge+'</div>';
      }

      var notes=gv(day,ex.id,cW,'notes');
      h+='<div class="notes-toggle" data-day="'+day+'" data-ex="'+ex.id+'">+ notes</div>';
      h+='<textarea class="notes-input" style="display:'+(notes?'block':'none')+'" placeholder="RPE? Form cues?" data-day="'+day+'" data-ex="'+ex.id+'" data-field="notes">'+notes+'</textarea>';
      h+='</div>';
    }
  }

  if(anyData){
    var chg='';
    if(prevTV>0&&cW>0){
      var p=((totV-prevTV)/prevTV*100).toFixed(1);
      var cls=totV>prevTV?'up':totV<prevTV?'down':'';
      chg='<div class="summary-row"><span class="label">vs Last Week</span><span class="value vol-val '+cls+'">'+(p>0?'+':'')+p+'%</span></div>';
    }
    h+='<div class="summary-card"><div class="summary-title">Session Summary</div>';
    h+='<div class="summary-row"><span class="label">Total Volume</span><span class="value">'+totV.toLocaleString()+' lbs</span></div>'+chg+'</div>';
  }
  c.innerHTML=h;
}

// --- Dashboard ---
function renderDash(){
  var c=document.getElementById('content'),h='';

  h+='<div class="dash-section"><h3>Week '+(cW+1)+' Completion</h3>';
  for(var k in W){if(!W.hasOwnProperty(k))continue;
    var has=hasData(k,cW);
    h+='<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><span>'+W[k].label+' \u2014 '+W[k].full.split('\u2014')[1]+'</span><span style="color:'+(has?'var(--green)':'var(--muted)')+';font-weight:700;font-size:18px">'+(has?'\u2713':'\u2014')+'</span></div>';
  }
  h+='</div>';

  var kl=[
    {name:"Incline DB Press",d:"mon",id:"incline_db_press",sets:4},
    {name:"Hack Squat",d:"tue",id:"hack_squat",sets:4},
    {name:"Seated DB OHP",d:"wed",id:"seated_db_ohp",sets:4},
    {name:"Weighted Pull-Up",d:"wed",id:"weighted_pullup",sets:4},
    {name:"Hip Thrust",d:"thu",id:"hip_thrust",sets:4},
    {name:"Chest-Supported Row",d:"mon",id:"chest_supported_row",sets:4}
  ];

  h+='<div class="dash-section"><h3>Key Lifts \u2014 Best Set This Week</h3>';
  for(var i=0;i<kl.length;i++){
    var l=kl[i],best=0,prevBest=0;
    for(var s=1;s<=l.sets;s++){var w=parseFloat(gv(l.d,l.id,cW,'wt'+s));if(!isNaN(w)&&w>best)best=w;}
    if(cW>0)for(var s2=1;s2<=l.sets;s2++){var w2=parseFloat(gv(l.d,l.id,cW-1,'wt'+s2));if(!isNaN(w2)&&w2>prevBest)prevBest=w2;}
    var chg2='';
    if(best&&prevBest){var d2=best-prevBest;if(d2>0)chg2='<span style="color:var(--green);font-size:12px;margin-left:6px">+'+d2+'</span>';else if(d2<0)chg2='<span style="color:var(--red);font-size:12px;margin-left:6px">'+d2+'</span>';}
    h+='<div class="kl-row"><span class="kl-name">'+l.name+'</span><span class="kl-val">'+(best?best+' lbs':'\u2014')+chg2+'</span></div>';
  }
  h+='</div>';

  h+='<div class="dash-section"><h3>Session Volume This Week</h3>';
  for(var k2 in W){if(!W.hasOwnProperty(k2))continue;
    var wo=W[k2],v=0,hd=false,pv=0;
    for(var i2=0;i2<wo.sections.length;i2++)for(var j=0;j<wo.sections[i2].exercises.length;j++){
      var e=wo.sections[i2].exercises[j];
      var ev=exVol(k2,e.id,cW,e.sets);if(ev!==null){v+=ev;hd=true;}
      if(cW>0){var pe=exVol(k2,e.id,cW-1,e.sets);if(pe!==null)pv+=pe;}
    }
    var chg3='';
    if(hd&&pv>0){var p2=((v-pv)/pv*100).toFixed(1);var col=v>pv?'var(--green)':v<pv?'var(--red)':'var(--yellow)';chg3='<span style="color:'+col+';font-size:12px;margin-left:6px">'+(p2>0?'+':'')+p2+'%</span>';}
    h+='<div class="kl-row"><span class="kl-name">'+wo.label+'</span><span class="kl-val">'+(hd?v.toLocaleString()+' lbs':'\u2014')+chg3+'</span></div>';
  }
  h+='</div>';

  var mets=['bodyweight','waist','sleep','protein'];
  var mL={bodyweight:'Body Weight (lbs)',waist:'Waist (in)',sleep:'Avg Sleep (hrs)',protein:'Protein (g/day)'};
  h+='<div class="dash-section"><h3>Body Metrics</h3>';
  for(var i3=0;i3<mets.length;i3++){
    var m=mets[i3],val=D['met_'+m+'_w'+cW]||'';
    h+='<div class="metric-card"><div class="mlabel">'+mL[m]+'</div>';
    h+='<input type="number" inputmode="decimal" step="any" value="'+val+'" placeholder="\u2014" data-metric="'+m+'"></div>';
  }
  h+='</div>';

  h+='<div class="data-actions">';
  h+='<button class="btn-export" id="btnExport">Export JSON</button>';
  h+='<button class="btn-import" id="btnImport">Import JSON</button>';
  h+='<button class="btn-clear" id="btnClear">Clear All</button>';
  h+='<input type="file" id="impF" accept=".json" style="display:none">';
  h+='</div>';

  // Migration helper
  h+='<div style="text-align:center;padding:16px 0"><button id="btnMigrate" style="background:var(--accent2);color:#fff;border:1px solid var(--accent2);border-radius:10px;padding:10px 20px;font-size:12px;font-weight:600;cursor:pointer;-webkit-appearance:none">Import from old tracker (sjT3)</button></div>';

  c.innerHTML=h;
}

// --- Event Handling ---
document.getElementById('prevWeek').addEventListener('click',function(){changeWeek(-1);});
document.getElementById('nextWeek').addEventListener('click',function(){changeWeek(1);});

document.getElementById('tabBar').addEventListener('click',function(e){
  var tab=e.target.closest('.tab-bar-item');
  if(!tab)return;
  cD=tab.getAttribute('data-day');
  renderTabs();render();
});

// Debounced save for inputs
var saveTimer=null;
function debouncedSave(){clearTimeout(saveTimer);saveTimer=setTimeout(function(){save();},400);}

document.getElementById('content').addEventListener('input',function(e){
  var el=e.target;
  if(el.matches('input[data-field="wt"]')){
    sv(el.getAttribute('data-day'),el.getAttribute('data-ex'),cW,'wt'+el.getAttribute('data-set'),el.value);
    debouncedSave();
  }else if(el.matches('input[data-field="rp"]')){
    sv(el.getAttribute('data-day'),el.getAttribute('data-ex'),cW,'r'+el.getAttribute('data-set'),el.value);
    debouncedSave();
  }else if(el.matches('textarea[data-field="notes"]')){
    sv(el.getAttribute('data-day'),el.getAttribute('data-ex'),cW,'notes',el.value);
    debouncedSave();
  }else if(el.matches('input[data-metric]')){
    var m2=el.getAttribute('data-metric'),k3='met_'+m2+'_w'+cW;
    if(el.value==='')delete D[k3];else D[k3]=el.value;
    debouncedSave();
  }
});

// Re-render on blur to update colors/summaries
document.getElementById('content').addEventListener('blur',function(e){
  var el=e.target;
  if(el.matches('input[data-field="wt"]')||el.matches('input[data-field="rp"]')){
    // Save immediately and re-render
    clearTimeout(saveTimer);
    var field=el.matches('input[data-field="wt"]')?'wt':'r';
    sv(el.getAttribute('data-day'),el.getAttribute('data-ex'),cW,field+el.getAttribute('data-set'),el.value);
    save();render();renderTabs();
  }
},true);

document.getElementById('content').addEventListener('click',function(e){
  var el=e.target;
  if(el.matches('.copy-link')){
    var day=el.getAttribute('data-day'),ex=el.getAttribute('data-ex'),ns=parseInt(el.getAttribute('data-sets'));
    var w1=gv(day,ex,cW,'wt1');
    if(!w1){toast('Enter S1 weight first');return;}
    for(var s=2;s<=ns;s++)sv(day,ex,cW,'wt'+s,w1);
    save();render();
  }else if(el.matches('.notes-toggle')){
    var ta=el.nextElementSibling;
    ta.style.display=ta.style.display==='none'?'block':'none';
    if(ta.style.display==='block')ta.focus();
  }else if(el.matches('#btnExport')||el.closest('#btnExport')){
    var blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);var a=document.createElement('a');
    a.href=url;a.download='sj_tracker_backup.json';a.click();URL.revokeObjectURL(url);toast('Exported!');
  }else if(el.matches('#btnImport')||el.closest('#btnImport')){
    document.getElementById('impF').click();
  }else if(el.matches('#btnClear')||el.closest('#btnClear')){
    if(confirm('Clear ALL tracker data? This cannot be undone.')){D={};try{localStorage.removeItem('sjT4');}catch(e2){}toast('Cleared');render();renderTabs();}
  }else if(el.matches('#btnMigrate')||el.closest('#btnMigrate')){
    try{
      var old=JSON.parse(localStorage.getItem('sjT3')||'{}');
      if(Object.keys(old).length===0){toast('No old data found');return;}
      // Merge old data into current
      for(var k4 in old){if(old.hasOwnProperty(k4)&&!D.hasOwnProperty(k4))D[k4]=old[k4];}
      save();render();renderTabs();toast('Imported '+Object.keys(old).length+' entries!');
    }catch(e3){toast('Migration failed');}
  }
});

document.getElementById('content').addEventListener('change',function(e){
  if(e.target.matches('#impF')){
    var f=e.target.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(ev){try{D=JSON.parse(ev.target.result);try{localStorage.setItem('sjT4',JSON.stringify(D));}catch(e4){}toast('Imported!');render();renderTabs();}catch(e2){toast('Invalid file');}};
    r.readAsText(f);e.target.value='';
  }
});

// --- PWA Install ---
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBanner').addEventListener('click',function(){
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;document.getElementById('installBanner').classList.remove('show');});}
});

// --- Service Worker ---
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}

// --- Init ---
load();changeWeek(0);renderTabs();render();

})();
</script>
</body>
</html>
